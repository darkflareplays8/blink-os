name: Build Blink OS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.1.1)"
        required: true
        default: "1.1.1"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      iso: ${{ steps.artifacts.outputs.iso }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ hashFiles('build/Dockerfile') }}
          restore-keys: |
            buildx-${{ hashFiles('build/Dockerfile') }}-main
            buildx-main
            buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t blink-os-builder ./build
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build ISO
        run: |
          mkdir -p output
          docker run --privileged \
            -e VERSION=${{ steps.version.outputs.version }} \
            -v ${{ github.workspace }}/config:/config:ro \
            -v ${{ github.workspace }}/output:/output \
            blink-os-builder

      - name: Read artifact name
        id: artifacts
        run: echo "iso=$(cat output/iso_name.txt)" >> $GITHUB_OUTPUT

      - name: Generate ISO checksum
        run: |
          cd output
          sha256sum ${{ steps.artifacts.outputs.iso }} > ${{ steps.artifacts.outputs.iso }}.sha256

      - name: Read git log for changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --oneline -20 --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV}..HEAD --oneline --pretty=format:"- %s")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release with ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Blink OS v${{ steps.version.outputs.version }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.log }}

            ---

            **System requirements**
            - 64-bit CPU · 512MB RAM minimum · 8GB storage · UEFI firmware
            - Built on Debian Bookworm
          draft: false
          files: |
            output/${{ steps.artifacts.outputs.iso }}
            output/${{ steps.artifacts.outputs.iso }}.sha256