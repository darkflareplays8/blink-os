name: Build Blink OS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.1.1)"
        required: true
        default: "1.1.1"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      iso: ${{ steps.artifacts.outputs.iso }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ hashFiles('build/Dockerfile') }}
          restore-keys: |
            buildx-${{ hashFiles('build/Dockerfile') }}-main
            buildx-main
            buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            -t blink-os-builder ./build
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build ISO
        run: |
          mkdir -p output
          docker run --privileged \
            -e VERSION=${{ steps.version.outputs.version }} \
            -v ${{ github.workspace }}/config:/config:ro \
            -v ${{ github.workspace }}/output:/output \
            blink-os-builder

      - name: Read artifact name
        id: artifacts
        run: echo "iso=$(cat output/iso_name.txt)" >> $GITHUB_OUTPUT

      - name: Generate ISO checksum
        run: |
          cd output
          sha256sum ${{ steps.artifacts.outputs.iso }} > ${{ steps.artifacts.outputs.iso }}.sha256

      - name: Read git log for changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --oneline -20 --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV}..HEAD --oneline --pretty=format:"- %s")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release with ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Blink OS v${{ steps.version.outputs.version }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.log }}

            ---

            **System requirements**
            - 64-bit CPU · 512MB RAM minimum · 8GB storage · UEFI firmware
            - Built on Debian Bookworm
          draft: true
          files: |
            output/${{ steps.artifacts.outputs.iso }}
            output/${{ steps.artifacts.outputs.iso }}.sha256

      - name: Upload ISO for OVA job
        uses: actions/upload-artifact@v4
        with:
          name: blink-iso
          path: output/${{ steps.artifacts.outputs.iso }}
          retention-days: 1

  build-ova:
    needs: build-iso
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Install VirtualBox
        run: |
          curl -fsSL https://www.virtualbox.org/download/oracle_vbox_2016.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/oracle-virtualbox.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox.gpg] \
            https://download.virtualbox.org/virtualbox/debian noble contrib" \
            | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update
          sudo apt-get install -y virtualbox-7.1

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: blink-iso
          path: output

      - name: Build OVA
        run: |
          VERSION="${{ needs.build-iso.outputs.version }}"
          ISO="output/blink-os-${VERSION}-amd64.iso"
          OVA="output/blink-os-${VERSION}.ova"

          VBoxManage createvm --name "BlinkOS" --ostype "Debian_64" --register
          VBoxManage modifyvm "BlinkOS" \
            --memory 2048 --cpus 2 --vram 128 \
            --graphicscontroller vmsvga \
            --audio none --firmware efi --usb on
          VBoxManage createhd --filename "/tmp/blink-disk.vdi" --size 20480 --format VDI
          VBoxManage storagectl "BlinkOS" --name "SATA" --add sata --controller IntelAhci
          VBoxManage storageattach "BlinkOS" --storagectl "SATA" --port 0 --device 0 --type hdd --medium "/tmp/blink-disk.vdi"
          VBoxManage storagectl "BlinkOS" --name "IDE" --add ide
          VBoxManage storageattach "BlinkOS" --storagectl "IDE" --port 0 --device 0 --type dvddrive --medium "$ISO"
          VBoxManage export "BlinkOS" --output "$OVA" --ovf20 --manifest --options manifest
          VBoxManage unregistervm "BlinkOS" --delete

      - name: Generate OVA checksum
        run: |
          VERSION="${{ needs.build-iso.outputs.version }}"
          cd output
          sha256sum "blink-os-${VERSION}.ova" > "blink-os-${VERSION}.ova.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-iso.outputs.version }}
          draft: false
          files: |
            output/blink-os-${{ needs.build-iso.outputs.version }}.ova
            output/blink-os-${{ needs.build-iso.outputs.version }}.ova.sha256