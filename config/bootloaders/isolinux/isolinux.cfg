UI vesamenu.c32
PROMPT 0
TIMEOUT 50
DEFAULT live

MENU TITLE Blink OS
MENU BACKGROUND splash.png
MENU COLOR title        1;37;40  #ffffffff #00000000 std
MENU COLOR border       30;44    #00000000 #00000000 std
MENU COLOR sel          7;37;40  #ff00d4ff #00000000 std
MENU COLOR unsel        37;44    #ffcdd6f4 #00000000 std
MENU COLOR hotsel       1;7;37   #ff00d4ff #00000000 std
MENU COLOR hotkey       1;37     #ff00d4ff #00000000 std
MENU COLOR tabmsg       31;40    #ff6c7086 #00000000 std

LABEL live
  MENU LABEL Blink OS
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd.img boot=live components quiet splash username=blink hostname=blink

LABEL failsafe
  MENU LABEL Blink OS (safe mode)
  KERNEL /live/vmlinuz
  APPEND initrd=/live/initrd.img boot=live components memtest noeject