[Toplevel bottom-panel]
expand=true
orientation=bottom
size=38
auto-hide=false
enable-animations=true

[Object bottom-panel:menu]
object-type=applet
applet-iid=MintMenuApplet::MintMenuApplet
position=0
panel-right-stick=false

[Object bottom-panel:taskbar]
object-type=applet
applet-iid=WnckletFactory::WindowListApplet
position=1
panel-right-stick=false

[Object bottom-panel:spacer]
object-type=applet
applet-iid=PanelInternalFactory::SeparatorApplet
position=2
panel-right-stick=true

[Object bottom-panel:systray]
object-type=applet
applet-iid=NotificationAreaAppletFactory::NotificationArea
position=3
panel-right-stick=true

[Object bottom-panel:clock]
object-type=applet
applet-iid=ClockAppletFactory::ClockApplet
position=4
panel-right-stick=true
